version: 2

models:
  - name: dim_users
    description: "User dimension - latest snapshot per user"
    columns:
      - name: user_id
        tests:
          - unique
          - not_null

  - name: dim_products
    description: "Product dimension - latest snapshot per product"
    columns:
      - name: product_id
        tests:
          - unique
          - not_null

  - name: fact_monthly_sales
    description: "Monthly sales fact table by product and user"
    columns:
      - name: sales_month
        tests:
          - not_null
      - name: product_id
        tests:
          - not_null
      - name: user_id
        tests:
          - not_null
      - name: net_sales
        tests:
          - not_null
